<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Photo 10.5 CMS Contenuti</title>
    <link href="/admin-contenuti/config.yml" type="text/yaml" rel="cms-config-url">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@3.12.2/dist/decap-cms.js"></script>
    <script src="/admin-contenuti/english-version.js"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin-contenuti/";
            });
          }
        });
      }
    </script>
  </body>
</html>
